name: CI

on:
  pull_request:
  push:

permissions:
  contents: read

# Cancel in-progress runs of the same workflow on the same ref when a new
# commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nix-build:
    name: Nix build (${{ matrix.attr }})
    runs-on: macos-latest

    # `id-token: write` is required by magic-nix-cache-action.
    permissions:
      contents: read
      id-token: write

    strategy:
      fail-fast: false
      matrix:
        attr:
          - prefmanager           # default GHC (9.10)
          - ghc912-prefmanager

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Set up Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Build
        run: nix -L build .#${{ matrix.attr }}

      - name: Smoke test
        # Only run the default-GHC build; other matrix entries are
        # compile-only checks.
        if: matrix.attr == 'prefmanager'
        run: nix run .#prefmanager -- domains > /dev/null

  nix-devshell:
    name: Nix devshell
    runs-on: macos-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22

      - name: Set up Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Build devshell
        run: nix -L develop . --command echo OK

  cabal-build:
    name: Cabal build (no Nix)
    runs-on: macos-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Haskell
        uses: haskell-actions/setup@v2
        with:
          ghc-version: '9.10.3'
          cabal-version: 'latest'

      - name: Build
        run: |
          cabal update
          cabal build
